<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Lecturers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .table thead { background-color: #34495e; color: white; }
        .btn-animated { transition: all 0.3s; }
        .btn-animated:hover { transform: scale(1.05); }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">Lecturers - <span th:text="${course.courseName}"></span></h2>
    <div class="mb-3">
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary btn-animated"><i class="fas fa-arrow-left"></i> Back</a>
    </div>
    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Lecturer ID</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="lecturer : ${lecturers}">
            <td th:text="${lecturer.name}">Name</td>
            <td th:text="${lecturer.email}">Email</td>
            <td th:text="${lecturer.lecturerId}">ID</td>

            <td>
                <!-- EDIT -->
                <a th:href="@{/admin/lecturer/edit/{id}(id=${lecturer.id})}"
                   class="btn btn-warning btn-sm btn-animated">
                    <i class="fas fa-edit"></i>
                </a>

                <!-- DELETE -->
                <a th:href="@{/admin/lecturer/delete/{id}(id=${lecturer.id})}"
                   class="btn btn-danger btn-sm btn-animated"
                   onclick="return confirm('Delete this lecturer?')">
                    <i class="fas fa-trash"></i>
                </a>


            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
