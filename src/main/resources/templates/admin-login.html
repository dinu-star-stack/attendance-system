<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | ATI Attendance</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #38bdf8;
            --accent-secondary: #0ea5e9;
            --accent-glow: rgba(56, 189, 248, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract glowing background blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            top: 10%;
            left: 15%;
            animation: float-slow 15s infinite alternate;
        }
        body::after {
            bottom: 10%;
            right: 15%;
            animation: float-slow 12s infinite alternate-reverse;
        }

        @keyframes float-slow {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-40px) scale(1.1); }
        }

        /* Glass Login Container */
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 45px 35px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            animation: card-appear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes card-appear {
            to { transform: translateY(0); opacity: 1; }
        }

        /* Logo Area */
        .logo-container {
            margin-bottom: 25px;
            display: inline-block;
            position: relative;
        }
        .logo-img {
            width: 75px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.4));
            transition: transform 0.4s ease;
        }
        .login-card:hover .logo-img {
            transform: scale(1.08) rotate(3deg);
        }

        h3 {
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 35px;
        }

        /* Form Styling */
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 24px;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            z-index: 10;
            transition: color 0.3s;
        }

        .form-control-custom {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px 48px 14px 48px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .form-control-custom:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(15, 23, 42, 0.85);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.15);
        }

        .form-control-custom:focus + .input-icon {
            color: var(--accent-primary);
        }

        .eye-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            z-index: 10;
            transition: color 0.3s;
        }

        .eye-icon:hover {
            color: var(--accent-primary);
        }

        /* Submit Button */
        .btn-submit {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #0f172a;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            font-size: 1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.25);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }

        .btn-submit:hover::after {
            left: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.4);
            color: #0f172a;
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* Alerts */
        .alert-custom {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 12px;
            color: #f87171;
            font-size: 0.9rem;
            padding: 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Portal Switching Link */
        .portal-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.88rem;
            transition: color 0.3s;
        }
        .portal-link:hover {
            color: var(--accent-primary);
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <!-- LOGO -->
    <div class="logo-container">
        <img th:src="@{/images/logo.png}" class="logo-img" alt="ATI Logo">
    </div>

    <h3>ATI ADMIN PORTAL</h3>
    <p class="subtitle">Please authenticate to access the manager dashboard</p>

    <form th:action="@{/admin/login}" method="post">
        <!-- Error Message -->
        <div th:if="${error}" class="alert-custom">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Username Input -->
        <div class="text-start">
            <label class="form-label">Username</label>
            <div class="input-group-custom">
                <input type="text" name="username" class="form-control-custom" placeholder="Enter admin username" required>
                <i class="fas fa-user-shield input-icon"></i>
            </div>
        </div>

        <!-- Password Input -->
        <div class="text-start">
            <label class="form-label">Password</label>
            <div class="input-group-custom">
                <input type="password" id="password" name="password" class="form-control-custom" placeholder="Enter your password" required>
                <i class="fas fa-key input-icon"></i>
                <i class="fas fa-eye eye-icon" onclick="togglePasswordVisibility('password', this)"></i>
            </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-submit">
            <i class="fas fa-sign-in-alt me-2"></i> Access Dashboard
        </button>
    </form>

    <a href="/" class="portal-link">
        <i class="fas fa-arrow-left me-1"></i> Back to Main Portal
    </a>
</div>

<script>
    function togglePasswordVisibility(inputId, eyeIcon) {
        const input = document.getElementById(inputId);
        if (input) {
            const type = input.getAttribute("type") === "password" ? "text" : "password";
            input.setAttribute("type", type);
            eyeIcon.classList.toggle("fa-eye");
            eyeIcon.classList.toggle("fa-eye-slash");
        }
    }
</script>

</body>
</html>
