<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Edit Student</h2>

    <form th:action="@{/admin/student/update}" th:object="${student}" method="post">

        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{course}" />

        <div class="mb-3">
            <label>Name</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" th:field="*{email}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Registration Number</label>
            <input type="text" th:field="*{registrationNumber}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Course Type</label>
            <select th:field="*{courseType}" class="form-control">
                <option value="Fulltime">Fulltime</option>
                <option value="Parttime">Parttime</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Batch Year</label>
            <input type="number" th:field="*{batchYear}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Update</button>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Cancel</a>

    </form>
</div>

</body>
</html>
