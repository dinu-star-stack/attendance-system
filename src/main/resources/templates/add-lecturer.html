<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Lecturer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-animated { transition: all 0.3s; }
        .btn-animated:hover { transform: scale(1.05); }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">Add Lecturer - <span th:text="${course.courseName}"></span></h2>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">

                <div th:if="${param.success}" class="alert alert-success">
                    Lecturer saved successfully!
                </div>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <!-- FORM -->
                <form th:action="@{/admin/course/{id}/save-lecturer(id=${course.id})}" th:object="${lecturer}" method="post">
                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Enter lecturer name" required>
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email" required>
                    </div>
                    <div class="mb-3">
                        <label>Lecturer ID</label>
                        <input type="text" th:field="*{lecturerId}" class="form-control" placeholder="Enter lecturer ID" required>
                    </div>

                    <button type="submit" class="btn btn-success btn-animated">
                        <i class="fas fa-chalkboard-teacher"></i> Save Lecturer
                    </button>
                    <a th:href="@{/admin/dashboard}" class="btn btn-secondary btn-animated">
                        <i class="fas fa-arrow-left"></i> Back
                    </a>
                </form>

            </div>
        </div>
    </div>
</div>
</body>
</html>
