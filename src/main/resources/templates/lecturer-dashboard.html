<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Portal | ATI Attendance</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090d16, #111827, #090d16);
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #10b981;
            --accent-secondary: #059669;
            --accent-glow: rgba(16, 185, 129, 0.12);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Background glows */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            top: -10%;
            left: -10%;
        }
        body::after {
            bottom: -10%;
            right: -10%;
        }

        /* Glass Navbar */
        .navbar-custom {
            background: rgba(15, 23, 42, 0.7) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 18px 0;
            z-index: 100;
        }

        .navbar-brand-custom {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .navbar-brand-custom img {
            width: 40px;
            height: auto;
            filter: drop-shadow(0 0 5px rgba(16, 185, 129, 0.4));
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171 !important;
            font-weight: 600;
            border-radius: 10px;
            padding: 8px 18px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2);
        }

        /* Main Container */
        .dashboard-container {
            margin-top: 130px;
            margin-bottom: 50px;
            position: relative;
            z-index: 10;
        }

        /* Hero / Welcome Card */
        .welcome-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.8));
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .welcome-card::after {
            content: '\f51b';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 40px;
            bottom: -20px;
            font-size: 10rem;
            color: rgba(255, 255, 255, 0.02);
            pointer-events: none;
        }

        .welcome-card h1 {
            font-weight: 800;
            letter-spacing: -0.8px;
            margin-bottom: 10px;
        }

        .welcome-card h1 span {
            color: var(--accent-primary);
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }

        .welcome-card p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin-bottom: 0;
        }

        /* Glassmorphic Stats/Info Card */
        .info-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            height: 100%;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .info-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
        }

        .info-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
            border-color: rgba(16, 185, 129, 0.25);
        }

        .card-icon-container {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
            font-size: 1.4rem;
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        .info-card:hover .card-icon-container {
            background: var(--accent-primary);
            color: #0f172a;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            transform: scale(1.05) rotate(3deg);
        }

        .info-card h5 {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .info-card .info-value {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-main);
            word-break: break-word;
        }

        .course-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.85rem;
            margin-right: 5px;
            margin-top: 5px;
        }

        /* Action Buttons Card */
        .action-card {
            background: rgba(30, 41, 59, 0.3);
            border: 1px dashed rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .btn-action-custom {
            width: 100%;
            max-width: 240px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #0f172a;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 1rem;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.25);
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .btn-action-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
            color: #0f172a;
        }

        .btn-history-custom {
            width: 100%;
            max-width: 240px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: white;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 1rem;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-history-custom:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand-custom" href="#">
            <img th:src="@{/images/logo.png}" alt="ATI Logo">
            ATI LECTURER PORTAL
        </a>
        <div class="ms-auto">
            <a class="btn btn-logout" th:href="@{/lecturer/logout}">
                <i class="fas fa-sign-out-alt me-1"></i> Logout
            </a>
        </div>
    </div>
</nav>

<div class="container dashboard-container">
    
    <!-- Welcome Card -->
    <div class="welcome-card">
        <h1>Welcome, <span th:text="${lecturer.name}">Lecturer Name</span></h1>
        <p>Manage your lectures, start real-time QR attendance codes, and monitor student attendance history for your assigned courses.</p>
    </div>

    <div class="row g-4">
        <!-- Lecturer ID Card -->
        <div class="col-md-4">
            <div class="info-card">
                <div>
                    <div class="card-icon-container">
                        <i class="fas fa-id-badge"></i>
                    </div>
                    <h5>Lecturer ID</h5>
                    <div class="info-value" th:text="${lecturer.lecturerId}">L100</div>
                </div>
            </div>
        </div>

        <!-- Assigned Courses Card -->
        <div class="col-md-4">
            <div class="info-card">
                <div>
                    <div class="card-icon-container">
                        <i class="fas fa-book-open"></i>
                    </div>
                    <h5>Assigned Courses</h5>
                    <div class="mt-2">
                        <span class="course-badge" th:each="course : ${lecturer.courses}" th:text="${course.courseCode}">HNDIT</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lecturer Actions Card -->
        <div class="col-md-4">
            <div class="action-card">
                <h5 class="mb-3 text-white">Lecture Operations</h5>
                <a th:href="@{/lecture/start}" class="btn-action-custom">
                    <i class="fas fa-qrcode"></i> Start Lecture QR
                </a>
                <a th:href="@{/lecture/dashboard}" class="btn-history-custom">
                    <i class="fas fa-history"></i> Lecture History
                </a>
            </div>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
