<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | ATI Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f8f9fa; }
        .navbar { background: #203a43 !important; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .dashboard-container { margin-top: 80px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="#">ATI Attendance</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/student/logout}">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container dashboard-container">
    <h2 class="mb-4">Welcome, <span th:text="${student.name}">Student Name</span></h2>
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card p-3 text-center">
                <h5>Registration Number</h5>
                <p th:text="${student.registrationNumber}">ABC123</p>
            </div>
        </div>
        <div class="col-md-6 mb-4">
            <div class="card p-3 text-center">
                <h5>Course</h5>
                <p th:text="${student.course.name}">Course Name</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
