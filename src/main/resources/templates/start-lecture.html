<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Lecture | ATI Attendance</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090d16, #111827, #090d16);
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #10b981;
            --accent-secondary: #059669;
            --accent-glow: rgba(16, 185, 129, 0.12);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract glowing background blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            top: 10%;
            left: 15%;
            animation: float-slow 15s infinite alternate;
        }
        body::after {
            bottom: 10%;
            right: 15%;
            animation: float-slow 12s infinite alternate-reverse;
        }

        @keyframes float-slow {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-40px) scale(1.1); }
        }

        /* Glass Form Container */
        .form-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 45px 35px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            animation: card-appear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes card-appear {
            to { transform: translateY(0); opacity: 1; }
        }

        h3 {
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 35px;
        }

        /* Form Styling */
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-group-custom {
            margin-bottom: 24px;
        }

        .form-control-custom {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .form-control-custom:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(15, 23, 42, 0.85);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
        }

        select.form-control-custom option {
            background-color: #0f172a;
            color: white;
        }

        /* Submit Button */
        .btn-submit {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #0f172a;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            font-size: 1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.25);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
            color: #0f172a;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: white;
            font-weight: 600;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
    </style>
</head>
<body>

<div class="form-card text-center">
    <div class="mb-3">
        <i class="fas fa-qrcode fa-3x" style="color: var(--accent-primary); filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.4));"></i>
    </div>

    <h3>START NEW LECTURE</h3>
    <p class="subtitle">Enter the lecture details to generate a secure real-time QR attendance code</p>

    <form th:action="@{/lecture/start}" method="post">
        <!-- Lecture Name Input -->
        <div class="form-group-custom text-start">
            <label class="form-label">Lecture Name / Topic</label>
            <input type="text" name="lectureName" class="form-control-custom" placeholder="e.g., OOP Design Patterns" required>
        </div>

        <!-- Course Selector -->
        <div class="form-group-custom text-start">
            <label class="form-label">Target Course</label>
            <select name="courseId" class="form-control-custom" required>
                <option value="" disabled selected>-- Select Course --</option>
                <option th:each="course : ${courses}"
                        th:value="${course.id}"
                        th:text="${course.courseName}">Course Name</option>
            </select>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-submit">
            <i class="fas fa-play me-1"></i> Start and Display QR
        </button>

        <a th:href="@{/lecturer/dashboard}" class="btn-back">
            <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
        </a>
    </form>
</div>

</body>
</html>
