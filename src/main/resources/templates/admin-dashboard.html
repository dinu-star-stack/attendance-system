<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ATI Admin Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #eef2f7, #d9e4f5);
    min-height: 100vh;
    color: #333;
}

/* Navbar Glass Effect */
.navbar {
    background: rgba(31, 42, 54, 0.85) !important;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.navbar-brand img {
    height: 50px;
}

/* Dashboard Title */
h2 {
    letter-spacing: 1px;
    color: #1f2a36;
}

/* Card - Glass + Glow */
.card {
    border-radius: 16px;
    padding: 20px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.15) !important;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    transition: all 0.4s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

/* Card hover glow animation */
.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.5s;
}

.card:hover::before {
    left: 100%;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* Icon - Neon Glow */
.card-icon {
    font-size: 38px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 15px;
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover .card-icon {
    transform: rotate(8deg) scale(1.1);
    box-shadow: 0 0 25px rgba(0,0,0,0.3);
}

/* Course name */
.course-name {
    color: #111;
    font-weight: 700;
    letter-spacing: 0.5px;
}

/* Buttons - Gradient + Shine */
.btn {
    border-radius: 10px;
    font-weight: 500;
    position: relative;
    overflow: hidden;
}

.btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.4s;
}

.btn:hover::after {
    left: 100%;
}

/* Button hover animation */
.btn-animated:hover {
    transform: scale(1.07);
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
}

/* Custom gradients for buttons */
.btn-primary {
    background: linear-gradient(45deg, #007bff, #00c6ff);
    border: none;
}
.btn-success {
    background: linear-gradient(45deg, #28a745, #5effa1);
    border: none;
}
.btn-info {
    background: linear-gradient(45deg, #17a2b8, #4facfe);
    border: none;
}
.btn-warning {
    background: linear-gradient(45deg, #ff9800, #ffc107);
    border: none;
}

/* Smooth page animation */
.container {
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin/dashboard}">
            <img th:src="@{/images/logo.png}" alt="ATI Logo">
            ATI Admin
        </a>
        <div class="ms-auto">
            <a class="btn btn-light btn-animated" th:href="@{/admin/logout}">Logout</a>
        </div>
    </div>
</nav>

<!-- Dashboard -->
<div class="container mt-5">
    <h2 class="mb-4 text-center fw-bold">Admin Dashboard</h2>

    <!-- Flash Messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show rounded-4 shadow-sm" role="alert">
        <i class="fas fa-check-circle me-2"></i> <span th:text="${successMessage}">Success</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-4 shadow-sm" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${errorMessage}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Real-time AJAX Search Bar -->
    <div class="row mb-5 justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 shadow-sm border-0" style="background: rgba(255,255,255,0.3) !important; border-radius: 20px;">
                <h5 class="fw-bold text-center mb-3"><i class="fas fa-search me-2 text-primary"></i> Real-time Search Hub (Students & Lecturers)</h5>
                <div class="input-group">
                    <span class="input-group-text bg-white border-0 rounded-start-pill ps-3"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" id="studentSearchInput" class="form-control border-0 rounded-end-pill py-2" placeholder="Type name or ID to search instantly..." onkeyup="performSearch()">
                </div>
                <!-- Dynamic Results List -->
                <div id="searchResults" class="row mt-3 g-3" style="display: none;">
                    <!-- Cards will be dynamically loaded here by JS -->
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">

        <!-- Iterate courses -->
        <div class="col-md-4" th:each="course : ${courses}">
            <div class="card p-4 text-center"
                 th:style="'background: linear-gradient(135deg,' + ${colors[course.id]} + ', #ffffff88)'">

                <!-- Card Icon based on course code -->
                <div class="card-icon">
                    <i th:class="${course.courseCode=='HNDIT' ? 'fas fa-laptop-code' :
                                  course.courseCode=='HNDA' ? 'fas fa-calculator' :
                                  course.courseCode=='HNDM' ? 'fas fa-briefcase' :
                                  'fas fa-book'}"></i>
                </div>

                <!-- Course Name -->
                <h5 class="card-title mt-2 course-name" th:text="${course.courseName}">Course Name</h5>
                <p class="card-text">Manage Students & Lecturers</p>

                <!-- Buttons with icons -->
                <div class="d-flex flex-column gap-2 mt-3">
                    <a th:href="@{'/admin/course/' + ${course.id} + '/view-students'}"
                       class="btn btn-info btn-animated text-white py-2">
                        <i class="fas fa-users me-2"></i> View Students
                    </a>
                    <a th:href="@{'/admin/course/' + ${course.id} + '/view-lecturers'}"
                       class="btn btn-warning btn-animated text-white py-2">
                        <i class="fas fa-user-tie me-2"></i> View Lecturers
                    </a>
                </div>
            </div>
        </div>

    </div>

    <!-- Bulk CSV (Excel) Import Center -->
    <div class="row mt-5 justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 shadow-sm border-0" style="background: rgba(255,255,255,0.3) !important; border-radius: 20px; cursor: default; transform: none; box-shadow: 0 8px 25px rgba(0,0,0,0.08) !important;">
                <h5 class="fw-bold text-center mb-4"><i class="fas fa-file-excel me-2 text-success"></i> Bulk Excel & CSV Upload Center</h5>
                
                <div class="row g-3 align-items-center mb-4 text-center">
                    <div class="col-md-6">
                        <a href="/admin/template/students" class="btn btn-outline-primary w-100 py-3 rounded-3 btn-animated">
                            <i class="fas fa-file-csv me-2"></i> Download Student Template
                        </a>
                    </div>
                    <div class="col-md-6">
                        <a href="/admin/template/lecturers" class="btn btn-outline-success w-100 py-3 rounded-3 btn-animated">
                            <i class="fas fa-file-csv me-2"></i> Download Lecturer Template
                        </a>
                    </div>
                </div>

                <hr style="opacity: 0.1;">

                <!-- Upload Form -->
                <form id="bulkImportForm" method="post" enctype="multipart/form-data" action="">
                    <div class="row g-3 text-start">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Select Target Course</label>
                            <select id="importCourseSelect" class="form-select py-2 rounded-3" required onchange="updateFormAction()">
                                <option value="" disabled selected>-- Choose Course --</option>
                                <option th:each="course : ${courses}" th:value="${course.id}" th:text="${course.courseCode} + ' - ' + ${course.courseName}">HNDIT</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Select Upload Type</label>
                            <select id="importTypeSelect" class="form-select py-2 rounded-3" required onchange="updateFormAction()">
                                <option value="students">Students List</option>
                                <option value="lecturers">Lecturers List</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Select Excel (CSV) File</label>
                            <input type="file" id="bulkImportFileInput" name="file" class="form-control py-2 rounded-3" accept=".csv, .xlsx, .xls" required>
                        </div>
                    </div>

                    <div class="text-center mt-4 d-flex justify-content-center gap-3 flex-wrap">
                        <a id="exportCurrentListBtn" href="#" class="btn btn-info text-white px-4 py-2 rounded-3 btn-animated disabled" onclick="triggerExport(event)">
                            <i class="fas fa-download me-2"></i> Download Current Database List
                        </a>
                        <button type="submit" class="btn btn-success px-5 py-2 rounded-3 btn-animated">
                            <i class="fas fa-upload me-2"></i> Import and Create Accounts
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

<!-- SheetJS (Excel Parsing Support) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
    // Update the action of bulk import form dynamically based on selections
    function updateFormAction() {
        const courseId = document.getElementById("importCourseSelect").value;
        const importType = document.getElementById("importTypeSelect").value;
        const form = document.getElementById("bulkImportForm");
        
        if (courseId && importType) {
            form.action = `/admin/course/${courseId}/import-${importType}`;
        }
        updateExportButton();
    }

    // Dynamic Export Button URL builder
    function updateExportButton() {
        const courseSelect = document.getElementById("importCourseSelect");
        const typeSelect = document.getElementById("importTypeSelect");
        const exportBtn = document.getElementById("exportCurrentListBtn");
        
        const courseId = courseSelect.value;
        const type = typeSelect.value;
        
        if (courseId && type) {
            exportBtn.href = `/admin/course/${courseId}/export-${type}`;
            exportBtn.classList.remove("disabled");
        } else {
            exportBtn.href = "#";
            exportBtn.classList.add("disabled");
        }
    }
    
    function triggerExport(e) {
        const exportBtn = document.getElementById("exportCurrentListBtn");
        if (exportBtn.classList.contains("disabled")) {
            e.preventDefault();
        }
    }

    // Intercept form submit to handle Excel (.xlsx / .xls) parsing client-side
    document.getElementById("bulkImportForm").addEventListener("submit", function(e) {
        const fileInput = document.getElementById("bulkImportFileInput");
        const file = fileInput.files[0];
        
        if (file && (file.name.endsWith(".xlsx") || file.name.endsWith(".xls"))) {
            e.preventDefault(); // Stop normal form submission
            
            // Show processing status
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalHtml = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin me-2"></i> Processing Excel...`;

            const reader = new FileReader();
            reader.onload = async function(evt) {
                try {
                    const data = new Uint8Array(evt.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const csv = XLSX.utils.sheet_to_csv(worksheet);
                    
                    // Create a blob and file from CSV
                    const blob = new Blob([csv], { type: 'text/csv' });
                    const csvFile = new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".csv", { type: 'text/csv' });
                    
                    // Build FormData and submit via fetch
                    const formData = new FormData();
                    formData.append("file", csvFile);
                    
                    const courseId = document.getElementById("importCourseSelect").value;
                    const importType = document.getElementById("importTypeSelect").value;
                    
                    const response = await fetch(`/admin/course/${courseId}/import-${importType}`, {
                        method: "POST",
                        body: formData
                    });
                    
                    if (response.redirected) {
                        window.location.href = response.url;
                    } else {
                        window.location.href = "/admin/dashboard?success";
                    }
                } catch (error) {
                    console.error("Error importing file: ", error);
                    alert("Failed to import Excel file. Please check format.");
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalHtml;
                }
            };
            reader.readAsArrayBuffer(file);
        }
    });

    // Perform Dynamic AJAX Unified Search Hub
    async function performSearch() {
        const query = document.getElementById("studentSearchInput").value.trim();
        const resultsContainer = document.getElementById("searchResults");
        
        if (query.length < 2) {
            resultsContainer.style.display = "none";
            resultsContainer.innerHTML = "";
            return;
        }

        try {
            const response = await fetch(`/admin/api/search-hub?query=${encodeURIComponent(query)}`);
            const items = await response.json();
            
            resultsContainer.innerHTML = "";
            resultsContainer.style.display = "flex";

            if (items.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="col-12 text-center text-muted py-4">
                        <i class="fas fa-user-slash fa-2x mb-2 text-danger"></i>
                        <p class="mb-0 fw-bold">No matching student or lecturer found</p>
                    </div>
                `;
                return;
            }

            items.forEach(item => {
                const card = document.createElement("div");
                card.className = "col-md-6 text-start";
                
                if (item.type === "student") {
                    card.innerHTML = `
                        <div class="card p-3 shadow-sm border-0" style="background: rgba(255,255,255,0.7) !important; cursor: default; border-left: 5px solid #007bff !important; transition: none; transform: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important;">
                            <h6 class="fw-bold mb-1" style="color: #1f2a36;">
                                <i class="fas fa-user-graduate text-primary me-2"></i>${item.name} 
                                <span class="badge bg-primary ms-2" style="font-size: 0.65rem;">Student</span>
                            </h6>
                            <small class="text-muted d-block mb-1"><i class="fas fa-id-badge me-2"></i>Reg: <strong>${item.regNumber}</strong></small>
                            <small class="text-muted d-block mb-1"><i class="fas fa-envelope me-2"></i>Email: ${item.email}</small>
                            <small class="text-muted d-block mb-1"><i class="fas fa-book me-2"></i>Course: ${item.courseName} (${item.courseType})</small>
                            <small class="text-muted d-block mb-2"><i class="fas fa-calendar-alt me-2"></i>Batch: ${item.batchYear}</small>
                            <div class="d-flex justify-content-end gap-2 pt-2 border-top" style="border-color: rgba(0,0,0,0.05) !important;">
                                <a href="/admin/student/edit/${item.id}" class="btn btn-sm btn-outline-primary px-3">
                                    <i class="fas fa-edit me-1"></i> Edit
                                </a>
                                <a href="/admin/student/delete/${item.id}" onclick="return confirm('Are you sure you want to remove student ${item.name}?');" class="btn btn-sm btn-outline-danger px-3">
                                    <i class="fas fa-trash-alt me-1"></i> Remove
                                </a>
                            </div>
                        </div>
                    `;
                } else if (item.type === "lecturer") {
                    const coursesList = item.courses && item.courses.length > 0 ? item.courses.join(", ") : "None";
                    card.innerHTML = `
                        <div class="card p-3 shadow-sm border-0" style="background: rgba(255,255,255,0.7) !important; cursor: default; border-left: 5px solid #28a745 !important; transition: none; transform: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important;">
                            <h6 class="fw-bold mb-1" style="color: #1f2a36;">
                                <i class="fas fa-chalkboard-teacher text-success me-2"></i>${item.name} 
                                <span class="badge bg-success ms-2" style="font-size: 0.65rem;">Lecturer</span>
                            </h6>
                            <small class="text-muted d-block mb-1"><i class="fas fa-id-badge me-2"></i>Lecturer ID: <strong>${item.lecturerId}</strong></small>
                            <small class="text-muted d-block mb-1"><i class="fas fa-envelope me-2"></i>Email: ${item.email}</small>
                            <small class="text-muted d-block mb-2"><i class="fas fa-book-open me-2"></i>Assigned Courses: ${coursesList}</small>
                            <div class="d-flex justify-content-end gap-2 pt-2 border-top" style="border-color: rgba(0,0,0,0.05) !important;">
                                <a href="/admin/lecturer/edit/${item.id}" class="btn btn-sm btn-outline-success px-3">
                                    <i class="fas fa-edit me-1"></i> Edit
                                </a>
                                <a href="/admin/lecturer/delete/${item.id}" onclick="return confirm('Are you sure you want to remove lecturer ${item.name}?');" class="btn btn-sm btn-outline-danger px-3">
                                    <i class="fas fa-trash-alt me-1"></i> Remove
                                </a>
                            </div>
                        </div>
                    `;
                }
                resultsContainer.appendChild(card);
            });
        } catch (error) {
            console.error("Search Error: ", error);
        }
    }

    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
    }

    /* Counter Animation */
    function animateValue(id, start, end, duration) {
        let range = end - start;
        let current = start;
        let increment = end > start ? 1 : -1;
        let stepTime = Math.abs(Math.floor(duration / range));

        let obj = document.getElementById(id);
        if (!obj) return;
        let timer = setInterval(function () {
            current += increment;
            obj.innerText = current;
            if (current == end) {
                clearInterval(timer);
            }
        }, stepTime);
    }

    /* Example values (you can connect backend later) */
    animateValue("courseCount", 0, 6, 1000);
    animateValue("studentCount", 0, 120, 1200);
    animateValue("lecturerCount", 0, 25, 1000);
    animateValue("activeCount", 0, 80, 1200);
</script>


</body>
</html>
