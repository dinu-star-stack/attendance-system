<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ATI Admin Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #eef2f7, #d9e4f5);
    min-height: 100vh;
    color: #333;
}

/* Navbar Glass Effect */
.navbar {
    background: rgba(31, 42, 54, 0.85) !important;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.navbar-brand img {
    height: 50px;
}

/* Dashboard Title */
h2 {
    letter-spacing: 1px;
    color: #1f2a36;
}

/* Card - Glass + Glow */
.card {
    border-radius: 16px;
    padding: 20px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.15) !important;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    transition: all 0.4s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

/* Card hover glow animation */
.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.5s;
}

.card:hover::before {
    left: 100%;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* Icon - Neon Glow */
.card-icon {
    font-size: 38px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 15px;
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover .card-icon {
    transform: rotate(8deg) scale(1.1);
    box-shadow: 0 0 25px rgba(0,0,0,0.3);
}

/* Course name */
.course-name {
    color: #111;
    font-weight: 700;
    letter-spacing: 0.5px;
}

/* Buttons - Gradient + Shine */
.btn {
    border-radius: 10px;
    font-weight: 500;
    position: relative;
    overflow: hidden;
}

.btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.4s;
}

.btn:hover::after {
    left: 100%;
}

/* Button hover animation */
.btn-animated:hover {
    transform: scale(1.07);
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
}

/* Custom gradients for buttons */
.btn-primary {
    background: linear-gradient(45deg, #007bff, #00c6ff);
    border: none;
}
.btn-success {
    background: linear-gradient(45deg, #28a745, #5effa1);
    border: none;
}
.btn-info {
    background: linear-gradient(45deg, #17a2b8, #4facfe);
    border: none;
}
.btn-warning {
    background: linear-gradient(45deg, #ff9800, #ffc107);
    border: none;
}

/* Smooth page animation */
.container {
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin/dashboard}">
            <img th:src="@{/images/logo.png}" alt="ATI Logo">
            ATI Admin
        </a>
        <div class="ms-auto">
            <a class="btn btn-light btn-animated" th:href="@{/admin/logout}">Logout</a>
        </div>
    </div>
</nav>

<!-- Dashboard -->
<div class="container mt-5">
    <h2 class="mb-4 text-center fw-bold">Admin Dashboard</h2>
    <div class="row g-4">

        <!-- Iterate courses -->
        <div class="col-md-4" th:each="course : ${courses}">
            <div class="card p-4 text-center"
                 th:style="'background: linear-gradient(135deg,' + ${colors[course.id]} + ', #ffffff88)'">

                <!-- Card Icon based on course code -->
                <div class="card-icon">
                    <i th:class="${course.courseCode=='HNDIT' ? 'fas fa-laptop-code' :
                                  course.courseCode=='HNDA' ? 'fas fa-calculator' :
                                  course.courseCode=='HNDM' ? 'fas fa-briefcase' :
                                  'fas fa-book'}"></i>
                </div>

                <!-- Course Name -->
                <h5 class="card-title mt-2 course-name" th:text="${course.courseName}">Course Name</h5>
                <p class="card-text">Manage Students & Lecturers</p>

                <!-- Buttons with icons -->
                <div class="d-flex flex-column gap-2 mt-3">
                    <a th:href="@{'/admin/course/' + ${course.id} + '/add-student'}"
                       class="btn btn-primary btn-animated">
                        <i class="fas fa-user-plus me-2"></i> Add Student
                    </a>
                    <a th:href="@{'/admin/course/' + ${course.id} + '/add-lecturer'}"
                       class="btn btn-success btn-animated">
                        <i class="fas fa-chalkboard-teacher me-2"></i> Add Lecturer
                    </a>
                    <a th:href="@{'/admin/course/' + ${course.id} + '/view-students'}"
                       class="btn btn-info btn-animated text-white">
                        <i class="fas fa-users me-2"></i> View Students
                    </a>
                    <a th:href="@{'/admin/course/' + ${course.id} + '/view-lecturers'}"
                       class="btn btn-warning btn-animated text-white">
                        <i class="fas fa-user-tie me-2"></i> View Lecturers
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
    }

    /* Counter Animation */
    function animateValue(id, start, end, duration) {
        let range = end - start;
        let current = start;
        let increment = end > start ? 1 : -1;
        let stepTime = Math.abs(Math.floor(duration / range));

        let obj = document.getElementById(id);
        let timer = setInterval(function () {
            current += increment;
            obj.innerText = current;
            if (current == end) {
                clearInterval(timer);
            }
        }, stepTime);
    }

    /* Example values (you can connect backend later) */
    animateValue("courseCount", 0, 6, 1000);
    animateValue("studentCount", 0, 120, 1200);
    animateValue("lecturerCount", 0, 25, 1000);
    animateValue("activeCount", 0, 80, 1200);
</script>


</body>
</html>
