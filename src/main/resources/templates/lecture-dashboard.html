<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture History | ATI Attendance</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090d16, #111827, #090d16);
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #10b981;
            --accent-secondary: #059669;
            --accent-glow: rgba(16, 185, 129, 0.12);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Background glows */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            top: -10%;
            left: -10%;
        }
        body::after {
            bottom: -10%;
            right: -10%;
        }

        /* Glass Navbar */
        .navbar-custom {
            background: rgba(15, 23, 42, 0.7) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 18px 0;
            z-index: 100;
        }

        .navbar-brand-custom {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .navbar-brand-custom img {
            width: 40px;
            height: auto;
            filter: drop-shadow(0 0 5px rgba(16, 185, 129, 0.4));
        }

        .btn-back-nav {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: white !important;
            font-weight: 600;
            border-radius: 10px;
            padding: 8px 18px;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-back-nav:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        /* Main Container */
        .history-container {
            margin-top: 130px;
            margin-bottom: 50px;
            position: relative;
            z-index: 10;
        }

        h2 {
            font-weight: 800;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        /* Glass Table Panel */
        .table-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
        }

        .table-custom {
            color: var(--text-main);
            margin-bottom: 0;
            width: 100%;
        }

        .table-custom th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.82rem;
            letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 12px;
        }

        .table-custom td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 12px;
            vertical-align: middle;
            font-size: 0.95rem;
        }

        .table-custom tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Status Badges */
        .badge-active {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .badge-inactive {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .text-course {
            color: var(--accent-primary);
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand-custom" href="/lecturer/dashboard">
            <img th:src="@{/images/logo.png}" alt="ATI Logo">
            ATI LECTURER PORTAL
        </a>
        <div class="ms-auto">
            <a th:href="@{/lecturer/dashboard}" class="btn-back-nav">
                <i class="fas fa-arrow-left me-1"></i> Dashboard
            </a>
        </div>
    </div>
</nav>

<div class="container history-container">
    <h2><i class="fas fa-history me-2 text-success"></i>Lecture Attendance History</h2>
    
    <div class="table-panel">
        <table class="table-custom">
            <thead>
                <tr>
                    <th>Lecture Name</th>
                    <th>Course Code</th>
                    <th>Date</th>
                    <th>Lecturer</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="lecture : ${lectures}">
                    <td class="fw-bold" th:text="${lecture.lectureName}">Lecture Topic</td>
                    <td class="text-course" th:text="${lecture.course.courseCode}">HNDIT</td>
                    <td th:text="${lecture.date}">2026-05-25</td>
                    <td th:text="${lecture.lecturer.name}">Lecturer Name</td>
                    <td>
                        <span th:if="${lecture.active}" class="badge-active"><i class="fas fa-broadcast-tower me-1 animate-pulse"></i> Active</span>
                        <span th:unless="${lecture.active}" class="badge-inactive">Closed</span>
                    </td>
                    <td>
                        <a th:if="${lecture.active}" th:href="@{/lecture/qr/{id}(id=${lecture.id})}" class="btn btn-sm btn-outline-success">
                            <i class="fas fa-external-link-alt me-1"></i> Show QR
                        </a>
                        <a th:unless="${lecture.active}" th:href="@{/attendance/pdf/lecture/{id}(id=${lecture.id})}" class="btn btn-sm btn-outline-info">
                            <i class="fas fa-file-pdf me-1"></i> PDF Report
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(lectures)}">
                    <td colspan="6" class="text-center py-5 text-muted">
                        <i class="fas fa-calendar-times fa-2x mb-2"></i><br>
                        No lectures recorded yet. Start your first lecture from the dashboard!
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
