<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Scan | ATI Attendance</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090d16, #111827, #090d16);
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #38bdf8;
            --accent-secondary: #0ea5e9;
            --accent-glow: rgba(56, 189, 248, 0.12);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient glowing background blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            top: 15%;
            left: 10%;
        }
        body::after {
            bottom: 15%;
            right: 10%;
        }

        /* Glass Confirmation Card */
        .confirm-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
            position: relative;
            text-align: center;
            transform: translateY(15px);
            opacity: 0;
            animation: card-appear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes card-appear {
            to { transform: translateY(0); opacity: 1; }
        }

        .icon-scanner {
            font-size: 3.5rem;
            color: var(--accent-primary);
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.4));
            margin-bottom: 20px;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h3 {
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .info-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 30px;
            font-size: 0.95rem;
            color: var(--text-muted);
            text-align: left;
        }

        .info-label {
            font-weight: 600;
            color: var(--text-main);
        }

        .btn-confirm {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #0f172a;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            padding: 14px;
            width: 100%;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.25);
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.45);
            color: #0f172a;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            font-weight: 600;
            border-radius: 14px;
            padding: 12px;
            width: 100%;
            font-size: 0.95rem;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="confirm-card">
    <div class="icon-scanner">
        <i class="fas fa-qrcode"></i>
    </div>

    <h3>ATTENDANCE VERIFICATION</h3>
    <p class="text-muted mb-4">A secure real-time lecture QR code has been successfully scanned.</p>

    <!-- Error Alert if any -->
    <div th:if="${error}" class="alert-error">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}">Error message here</span>
    </div>

    <div th:if="${message}" class="alert alert-info border-0 rounded-4 text-start">
        <i class="fas fa-info-circle me-2"></i>
        <span th:text="${message}">Message here</span>
    </div>

    <!-- Details Box -->
    <div class="info-box">
        <div class="mb-2"><span class="info-label">Verification Token:</span> <code class="text-info" th:text="${token}">token-value</code></div>
        <div><span class="info-label">Action Required:</span> Click confirm below to securely mark your attendance for today's session.</div>
    </div>

    <!-- Confirmation Links -->
    <a th:href="@{/student/mark-attendance(token=${token})}" class="btn-confirm">
        <i class="fas fa-check-circle"></i> Confirm My Attendance
    </a>

    <a th:href="@{/student/dashboard}" class="btn-cancel">
        <i class="fas fa-times-circle"></i> Cancel and Return
    </a>
</div>

</body>
</html>
