<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .table thead { background-color: #34495e; color: white; }
        .btn-animated { transition: all 0.3s; }
        .btn-animated:hover { transform: scale(1.05); }
        .batch-title {
            background: #2c3e50;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">
        Students - <span th:text="${course.courseName}"></span>
    </h2>

    <div class="mb-3">
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary btn-animated">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>

    <!-- Loop by Batch Year -->
    <div th:each="entry : ${studentsByBatch}">

        <div class="batch-title">
            <i class="fas fa-layer-group"></i>
            Batch Year: <span th:text="${entry.key}"></span>
        </div>

        <table class="table table-striped table-hover mt-2">
            <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Registration Number</th>
                <th>Course Type</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student : ${entry.value}">
                <td th:text="${student.name}">Name</td>
                <td th:text="${student.email}">Email</td>
                <td th:text="${student.registrationNumber}">Reg No</td>
                <td th:text="${student.courseType}">Fulltime</td>

                <td>
                    <!-- EDIT -->
                    <a th:href="@{/admin/student/edit/{id}(id=${student.id})}"
                       class="btn btn-warning btn-sm btn-animated">
                        <i class="fas fa-edit"></i>
                    </a>

                    <!-- DELETE -->
                    <a th:href="@{/admin/student/delete/{id}(id=${student.id})}"
                       class="btn btn-danger btn-sm btn-animated"
                       onclick="return confirm('Are you sure to delete?');">
                        <i class="fas fa-trash"></i>
                    </a>


                </td>
            </tr>
            </tbody>
        </table>

    </div>

</div>
</body>
</html>
