<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Course Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand"
          th:text="${course.name} + ' Management'"></span>

    <a th:href="@{/admin/dashboard}"
       class="btn btn-outline-light">
        Back
    </a>
</nav>

<div class="container mt-5">

    <div class="row g-4">

        <div class="col-md-6">
            <div class="card shadow p-4 text-center">
                <h4>Add Student</h4>
                <a th:href="@{'/admin/course/' + ${course.id} + '/add-student'}"
                   class="btn btn-primary mt-3">
                    Add Student
                </a>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow p-4 text-center">
                <h4>Add Lecturer</h4>
                <a th:href="@{'/admin/course/' + ${course.id} + '/add-lecturer'}"
                   class="btn btn-success mt-3">
                    Add Lecturer
                </a>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow p-4 text-center">
                <h4>View Students</h4>
                <a th:href="@{'/admin/course/' + ${course.id} + '/students'}"
                   class="btn btn-info mt-3">
                    View Students
                </a>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow p-4 text-center">
                <h4>View Lecturers</h4>
                <a th:href="@{'/admin/course/' + ${course.id} + '/lecturers'}"
                   class="btn btn-warning mt-3">
                    View Lecturers
                </a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
