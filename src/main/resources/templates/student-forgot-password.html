<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            linear-gradient(135deg,#0f172a,#1e293b,#111827);

            font-family:Arial;
        }

        .card-box{

            width:420px;
            padding:40px;
            border-radius:25px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,0.1);

            box-shadow:0 10px 40px rgba(0,0,0,0.4);

            color:white;
        }

        .form-control{

            height:50px;
            border-radius:12px;
            background:rgba(255,255,255,0.08);
            border:none;
            color:white;
        }

        .form-control::placeholder{
            color:#d1d5db;
        }

        .btn-custom{

            height:50px;
            border-radius:12px;
            font-weight:bold;
            background:linear-gradient(to right,#2563eb,#7c3aed);
            border:none;
        }

    </style>
</head>
<body>

<div class="card-box">

    <h2 class="text-center mb-4">
        Student Forgot Password
    </h2>

    <div th:if="${error}"
         class="alert alert-danger"
         th:text="${error}">
    </div>

    <div th:if="${message}"
         class="alert alert-success"
         th:text="${message}">
    </div>

    <form method="post"
          th:action="@{/student/forgot-password}">

        <div class="mb-3">

            <input type="text"
                   name="registrationNumber"
                   class="form-control"
                   placeholder="Registration Number"
                   required>

        </div>

        <div class="mb-3">

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Student Email"
                   required>

        </div>

        <button class="btn btn-custom w-100 text-white">
            Send Reset Link
        </button>

    </form>

</div>

</body>
</html>
